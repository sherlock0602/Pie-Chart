<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動式圓形百分圖 (進階教學版)</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            width: 100%;
            max-width: 1300px;
            background: #fff;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .question-box {
            background-color: #e3f2fd;
            border-left: 6px solid #1976d2;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 19px;
            font-family: "DFKai-SB", "BiauKai", "標楷體", sans-serif;
            font-weight: bold;
        }
        .content-grid {
            display: grid;
            grid-template-columns: 0.8fr 1.3fr 1.6fr; 
            gap: 20px;
            align-items: flex-start;
        }
        .section-title {
            color: #1976d2;
            border-bottom: 2px solid #bbdefb;
            padding-bottom: 8px;
            margin-top: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 15px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }
        th { background-color: #f5f5f5; }
        input[type="number"] {
            width: 50px;
            padding: 5px;
            text-align: center;
            font-size: 15px;
        }
        .total-row { font-weight: bold; background-color: #fafafa; }
        .calc-box {
            background: #fffdf5;
            border: 1px solid #ffe082;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 16px;
            line-height: 1.8;
            min-height: 380px;
            box-sizing: border-box;
        }
        .chart-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        canvas {
            background-color: transparent;
            max-width: 100%;
            margin-top: -15px; 
        }
        .chart-title {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 5px; 
            text-align: center;
        }
        button {
            margin-top: 20px;
            background-color: #1976d2;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        button:hover { background-color: #115293; }
        button:disabled { background-color: #90caf9; cursor: not-allowed; }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 10px;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .color-box { width: 15px; height: 15px; border-radius: 3px; border: 1px solid #333; }
        .alert-box {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-family: "Microsoft JhengHei", sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="question-box">
        <strong>📝 題目：</strong>請根據左側「喵喵國小」中、高年級參加淨灘活動的人數，計算出各年級所佔的百分率，並畫出圓形百分圖。
    </div>

    <div class="content-grid">
        <div class="data-section">
            <h3 class="section-title">📊 步驟一：數據統計</h3>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>年級</th>
                        <th>人數(人)</th>
                        <th>百分率(%)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>三年級</td>
                        <td><input type="number" class="data-input" value="0" min="0"></td>
                        <td class="pct-cell">0%</td>
                    </tr>
                    <tr>
                        <td>四年級</td>
                        <td><input type="number" class="data-input" value="0" min="0"></td>
                        <td class="pct-cell">0%</td>
                    </tr>
                    <tr>
                        <td>五年級</td>
                        <td><input type="number" class="data-input" value="0" min="0"></td>
                        <td class="pct-cell">0%</td>
                    </tr>
                    <tr>
                        <td>六年級</td>
                        <td><input type="number" class="data-input" value="0" min="0"></td>
                        <td class="pct-cell">0%</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="total-row">
                        <td>合計</td>
                        <td id="totalCount">0</td>
                        <td id="totalPct">100%</td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="calc-section">
            <h3 class="section-title">🧮 步驟二：計算過程</h3>
            <div class="calc-box" id="calcProcess">
            </div>
        </div>

        <div class="chart-box">
            <h3 class="section-title">🥧 步驟三：圓形百分圖</h3>
            <canvas id="pieCanvas" width="420" height="380"></canvas>
            <div class="chart-title">喵喵國小中、高年級學生參加淨灘活動人數圓形百分圖</div>
            <div class="legend" id="legendBox"></div>
            <button id="drawBtn">▶ 分解播放繪製過程</button>
        </div>
    </div>
</div>

<script>
    const colors = ['#4DA8DA', '#82C09A', '#F2CB6C', '#E2856E'];
    const labels = ['三年級', '四年級', '五年級', '六年級'];
    
    const inputs = document.querySelectorAll('.data-input');
    const pctCells = document.querySelectorAll('.pct-cell');
    const totalCountEl = document.getElementById('totalCount');
    const calcProcessEl = document.getElementById('calcProcess');
    const canvas = document.getElementById('pieCanvas');
    const ctx = canvas.getContext('2d');
    const drawBtn = document.getElementById('drawBtn');
    const legendBox = document.getElementById('legendBox');

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const radius = 150; 

    let chartData = [];
    let isDrawing = false;

    const sleep = ms => new Promise(res => setTimeout(res, ms));

    function updateData() {
        if (isDrawing) return; 
        
        let total = 0;
        let values = [];
        let maxVal = -1;
        let maxIdx = -1;

        inputs.forEach((input, idx) => {
            let val = parseInt(input.value) || 0;
            values.push(val);
            total += val;
            if (val > maxVal) {
                maxVal = val;
                maxIdx = idx;
            }
        });

        totalCountEl.textContent = total;
        
        let rawPcts = [];
        values.forEach(val => {
            rawPcts.push(total > 0 ? Math.round((val / total) * 100) : 0);
        });

        let sumPct = rawPcts.reduce((a, b) => a + b, 0);
        let finalPcts = [...rawPcts];
        let diff = 0;

        if (total > 0 && sumPct !== 100 && sumPct !== 0) {
            diff = 100 - sumPct;
            finalPcts[maxIdx] += diff; 
        }

        let processHTML = '<strong>部分 ÷ 全部 = 小數 → 百分率</strong><br><br>';
        chartData = [];

        values.forEach((val, index) => {
            let rawPct = rawPcts[index];
            let finalPct = finalPcts[index];
            let processStr = `${labels[index]}: ${val} ÷ ${total}`;
            
            if (total > 0) {
                let rawDecimal = val / total;
                let isExact = Math.abs(rawDecimal - (rawPct / 100)) < 0.0001;
                let sign = isExact ? "=" : "&approx;";
                
                let displayDecimal = rawDecimal.toFixed(3);
                if (displayDecimal.endsWith('0')) {
                    displayDecimal = rawDecimal.toFixed(2);
                }

                processStr += ` ${sign} ${displayDecimal} ${sign} ${rawPct}%`;
                
                if (index === maxIdx && diff !== 0) {
                    processStr += ` <span style="color:#d32f2f; font-weight:bold;">(調整為 ${finalPct}%)</span>`;
                }
            } else {
                processStr += ` = 0 = 0%`;
            }
            
            pctCells[index].textContent = finalPct + '%';
            processHTML += processStr + '<br><br>';
            
            chartData.push({ label: labels[index], pct: finalPct, color: colors[index] });
        });

        if (diff !== 0) {
            let action = diff > 0 ? "補給" : "扣除";
            processHTML += `<div class="alert-box">
            ⚠️ <strong>誤差調整說明：</strong><br>因四捨五入，原百分率加總為 ${sumPct}%。<br>為了讓總和滿足 100%，系統已將相差的 ${Math.abs(diff)}% <strong>${action}</strong> 比例最高的「${labels[maxIdx]}」。</div>`;
        }

        calcProcessEl.innerHTML = processHTML;
        
        legendBox.innerHTML = chartData.map(d => 
            `<div class="legend-item"><div class="color-box" style="background:${d.color}"></div>${d.label}</div>`
        ).join('');

        drawFullChart();
    }

    // 繪製背景底圖 (100格刻度)
    function drawBaseTicks() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.stroke();

        for (let i = 0; i < 100; i++) {
            let angle = (i / 100) * 2 * Math.PI - (Math.PI / 2);
            let isMajor = (i % 10 === 0);
            let isMedium = (i % 5 === 0);
            
            let tickLength = isMajor ? 12 : (isMedium ? 8 : 4);
            let tickWidth = isMajor ? 2 : 1;
            
            let x1 = cx + radius * Math.cos(angle);
            let y1 = cy + radius * Math.sin(angle);
            let x2 = cx + (radius + tickLength) * Math.cos(angle);
            let y2 = cy + (radius + tickLength) * Math.sin(angle);

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#555';
            ctx.lineWidth = tickWidth;
            ctx.stroke();
            
            if (isMajor) {
                let textRadius = radius + 22;
                let tx = cx + textRadius * Math.cos(angle);
                let ty = cy + textRadius * Math.sin(angle);
                ctx.font = "13px Arial";
                ctx.fillStyle = "#666";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(i === 0 ? "0" : i, tx, ty);
            }
        }
    }

    // 繪製文字標籤
    function drawSliceLabel(data, startAngle, endAngle) {
        if (data.pct === 0) return;
        let midAngle = startAngle + (endAngle - startAngle) / 2;
        let textRadius = radius * 0.65; 
        
        let tx = cx + textRadius * Math.cos(midAngle);
        let ty = cy + textRadius * Math.sin(midAngle);

        ctx.fillStyle = "#111"; 
        ctx.font = "bold 15px 'Microsoft JhengHei', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        ctx.fillText(data.label, tx, ty - 10); 
        ctx.fillText(`${data.pct}%`, tx, ty + 10); 
    }

    // 靜態圖表繪製 (沒有動畫的瞬間完成狀態)
    function drawFullChart() {
        drawBaseTicks();
        let startAngle = -Math.PI / 2;
        
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + radius * Math.cos(startAngle), cy + radius * Math.sin(startAngle));
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 2;
        ctx.stroke();

        chartData.forEach(data => {
            if (data.pct === 0) return;
            let sliceAngle = (data.pct / 100) * 2 * Math.PI;
            let endAngle = startAngle + sliceAngle;

            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, radius, startAngle, endAngle);
            ctx.closePath();
            
            ctx.fillStyle = data.color;
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + radius * Math.cos(endAngle), cy + radius * Math.sin(endAngle));
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 2;
            ctx.stroke();

            drawSliceLabel(data, startAngle, endAngle);
            startAngle = endAngle;
        });
    }

    // ★核心升級：全新設計的動態重繪引擎
    async function drawPieChartStepByStep() {
        if (isDrawing || chartData.reduce((sum, d) => sum + d.pct, 0) === 0) return;
        
        isDrawing = true;
        drawBtn.disabled = true;
        inputs.forEach(input => input.disabled = true);
        
        let startAngle = -Math.PI / 2; 
        let drawnSlices = []; // 儲存已經畫完的扇形，用來在每幀重繪背景

        // 背景與已完成扇形的重繪函數
        function renderBackground() {
            drawBaseTicks();
            drawnSlices.forEach(slice => {
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, slice.startAngle, slice.endAngle);
                ctx.closePath();
                ctx.fillStyle = slice.color;
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + radius * Math.cos(slice.startAngle), cy + radius * Math.sin(slice.startAngle));
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + radius * Math.cos(slice.endAngle), cy + radius * Math.sin(slice.endAngle));
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 2;
                ctx.stroke();

                drawSliceLabel(slice, slice.startAngle, slice.endAngle);
            });
        }

        renderBackground();

        // 1. 動畫：從圓心拉出第一條 12 點鐘方向的起點黑線
        let lineFrames = 15;
        for (let f = 1; f <= lineFrames; f++) {
            renderBackground();
            let currentR = radius * (f / lineFrames);
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + currentR * Math.cos(startAngle), cy + currentR * Math.sin(startAngle));
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 2;
            ctx.stroke();
            await sleep(20);
        }
        await sleep(300);

        for (let i = 0; i < chartData.length; i++) {
            let data = chartData[i];
            if (data.pct === 0) continue;

            let sliceAngle = (data.pct / 100) * 2 * Math.PI;
            let endAngle = startAngle + sliceAngle;
            
            // 2. 動畫：扇形塗色，數字動態跳動
            let fillFrames = 30; // 稍微增加幀數讓跳動看得更清楚
            for (let f = 1; f <= fillFrames; f++) {
                renderBackground();
                
                // 保留左側基準黑線不被顏色蓋過
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + radius * Math.cos(startAngle), cy + radius * Math.sin(startAngle));
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 2;
                ctx.stroke();

                // 畫出正在擴張的扇形
                let currentEndAngle = startAngle + (sliceAngle * (f / fillFrames));
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, startAngle, currentEndAngle);
                ctx.closePath();
                ctx.fillStyle = data.color;
                ctx.fill();
                
                // 計算並繪製「跳動中的百分率」 (文字固定在最終扇形的中心)
                let currentPct = Math.round(data.pct * (f / fillFrames));
                let tempSlice = { label: data.label, pct: currentPct };
                drawSliceLabel(tempSlice, startAngle, endAngle);
                
                await sleep(20); 
            }

            // 3. 動畫：從圓心向外畫出結束的黑線
            for (let f = 1; f <= lineFrames; f++) {
                renderBackground();

                // 補滿當前完整的扇形與跳動完畢的數字
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = data.color;
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + radius * Math.cos(startAngle), cy + radius * Math.sin(startAngle));
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 2;
                ctx.stroke();
                
                drawSliceLabel(data, startAngle, endAngle);

                // 畫出正在生長的結束黑線
                let currentR = radius * (f / lineFrames);
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + currentR * Math.cos(endAngle), cy + currentR * Math.sin(endAngle));
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 2;
                ctx.stroke();

                await sleep(20);
            }

            // 把畫好的這個扇形存起來，供下一輪重繪使用
            drawnSlices.push({
                ...data,
                startAngle: startAngle,
                endAngle: endAngle
            });

            startAngle = endAngle;
            await sleep(500); // 畫完一個項目後停頓半秒，準備畫下一個
        }

        isDrawing = false;
        drawBtn.disabled = false;
        inputs.forEach(input => input.disabled = false);
    }

    inputs.forEach(input => input.addEventListener('input', updateData));
    drawBtn.addEventListener('click', drawPieChartStepByStep);

    updateData();

</script>
</body>
</html>
